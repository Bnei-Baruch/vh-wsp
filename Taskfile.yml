# https://taskfile.dev

version: '3'

vars:
  DIR_PROFILES: '{{default "../vh-srv-profile" .DIR_PROFILES}}'
  DIR_ORDERS:   '{{default "../pay/orders" .DIR_ORDERS}}'
  DIR_EVENTS:   '{{default "../vh-srv-events" .DIR_EVENTS}}'
  DIR_FRONT: '{{default "../vh-front" .DIR_FRONT}}'
  DIR_DASH: '{{default "../vh-dash" .DIR_DASH}}'
  DIR_PAYMENT: '{{default "../pay/vh-payment" .DIR_PAYMENT}}'
  DIR_PAYMENT_BO: '{{default "../pay/vh-payment-bo" .DIR_PAYMENT_BO}}'
  DIR_EVENTS_BO: '{{default "../vh-events-bo" .DIR_EVENTS_BO}}'
  POSTGRES_USER: '{{default "user" .POSTGRES_USER}}'
  POSTGRES_PASSWORD: '{{default "password" .POSTGRES_PASSWORD}}'
  POSTGRES_PORT: '{{default "5432" .POSTGRES_PORT}}'
  NATS_PORT: '{{default "4222" .NATS_PORT}}'
  NATS_MONITOR_PORT: '{{default "8222" .NATS_MONITOR_PORT}}'
  NGINX_WEB_PORT: '{{default "8080" .NGINX_WEB_PORT}}'
  NGINX_API_PORT: '{{default "9000" .NGINX_API_PORT}}'

dotenv: ['.env']

silent: true

includes:
  replica:
    taskfile: ./replica/Taskfile.yml
    dir: ./replica

tasks:

  default: echo "Virtual Home Development Environment"

  # Private helper: run a task in a sub-project Taskfile, with correct CWD.
  _run:
    internal: true
    vars:
      DIR:    '{{.DIR}}'      # project directory
      TARGET: '{{.TARGET}}'   # task name in that project's Taskfile
    dir: '{{.DIR}}'           # ensures the working directory is the project folder
    cmds:
      - task -t Taskfile.yml {{.TARGET}}

  # Private helper: run a task in each backend sub-project.
  _run_all_backend_services:
    internal: true
    vars:
      TARGET: '{{.TARGET}}'   # task name in each project's Taskfile
    cmds:
      - task: _run 
        vars:
          DIR: 
            ref: .DIR_ORDERS
          TARGET: '{{.TARGET}}'
      - task: _run 
        vars:
          DIR: 
            ref: .DIR_PROFILES
          TARGET: '{{.TARGET}}'
      - task: _run 
        vars:
          DIR: 
            ref: .DIR_EVENTS
          TARGET: '{{.TARGET}}'

  # =============================================================================
  # DEVELOPMENT INFRASTRUCTURE COMMANDS
  # =============================================================================
  
  infra:up:
    desc: Start all development infrastructure (PostgreSQL + NATS)
    cmds:
      - docker compose --profile infra up -d
      - docker exec vh-dev-db psql -U {{.POSTGRES_USER}} -d template1 -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;" >/dev/null;
      - echo "All development infrastructure started!"
      - 'echo "Shared PostgreSQL: localhost:{{.POSTGRES_PORT}}"'
      - 'echo "Shared NATS: localhost:{{.NATS_PORT}} (monitoring: localhost:{{.NATS_MONITOR_PORT}})"'

  infra:stop:
    desc: Stop all development infrastructure (keep data)
    cmds:
      - docker compose --profile infra stop
      - echo "All development infrastructure stopped (data preserved)"

  infra:down:
    desc: Stop and remove all development infrastructure
    cmds:
      - docker compose --profile infra down
      - echo "All development infrastructure removed"

  infra:clean:
    desc: Stop and remove all development containers and volumes
    cmds:
      - docker compose --profile infra down -v --remove-orphans
      - echo "All development environment cleaned!"

  infra:status:
    desc: Show status of all development infrastructure
    cmds:
      - docker compose --profile infra ps -a db nats
  
  infra:logs:
    desc: Show and follow logs from all development infrastructure containers
    cmds:
      - docker compose --profile infra logs --tail=50 -f db nats

  infra:nats:monitor:
    desc: Open NATS monitoring interface
    cmds:
      - 'echo "NATS monitoring available at: http://localhost:{{.NATS_MONITOR_PORT}}"'
      - open http://localhost:{{.NATS_MONITOR_PORT}} || echo "Please open http://localhost:{{.NATS_MONITOR_PORT}} in your browser"

  profiles:db:shell:
    desc: Open PostgreSQL shell for profiles service
    cmds:
      - task: _run
        vars:
          DIR: 
            ref: .DIR_PROFILES
          TARGET: db:shell

  orders:db:shell:
    desc: Open PostgreSQL shell for orders service
    cmds:
      - task: _run
        vars:
          DIR: 
            ref: .DIR_ORDERS
          TARGET: db:shell

  events:db:shell:
    desc: Open PostgreSQL shell for events service
    cmds:
      - task: _run
        vars:
          DIR: 
            ref: .DIR_EVENTS
          TARGET: db:shell

  # =============================================================================
  # NGINX WEB PROXY MANAGEMENT
  # =============================================================================
  
  nginx:up:
    desc: Start nginx proxy
    cmds:
      - docker compose --profile web up -d nginx
      - echo "✅ Nginx proxy started!"
      - echo "   Web apps → http://localhost:{{.NGINX_WEB_PORT}}"
      - echo "   APIs → http://localhost:{{.NGINX_API_PORT}}"

  nginx:stop:
    desc: Stop nginx proxy
    cmds:
      - docker compose --profile web stop
      - echo "✅ Nginx proxy stopped!"

  nginx:down:
    desc: Stop and remove nginx proxy
    cmds:
      - docker compose --profile web down
      - echo "✅ Nginx proxy removed!"

  nginx:clean:
    desc: Stop and remove all nginx proxy containers and volumes
    cmds:
      - docker compose --profile web down -v --remove-orphans
      - echo "✅ Nginx proxy environment cleaned!"

  nginx:status:
    desc: Show status of nginx proxy
    cmds:
      - docker compose --profile web ps

  nginx:logs:
    desc: Show nginx proxy logs
    cmds:
      - docker compose --profile web logs --tail=50 -f

  nginx:restart:
    desc: Restart nginx proxy (reload config)
    cmds:
      - docker compose --profile web restart
      - echo "✅ Nginx proxy restarted!"

  nginx:reload:
    desc: Reload nginx config without restarting
    cmds:
      - docker compose --profile web exec nginx nginx -s reload
      - echo "✅ Nginx config reloaded!"

  # =============================================================================
  # BACKEND SERVICES COMMANDS
  # =============================================================================

  backend:up:
    desc: Build and start all backend services in docker compose mode. Use BUILD=true to rebuild images.
    aliases: [be:up]
    vars:
      BUILD: '{{default "" .BUILD}}'
    cmds:
      - task: infra:up
      - task: nginx:up
      - task: _run_all_backend_services 
        vars:
          TARGET: db:ensure
      - |
        if [ "{{.BUILD}}" = "true" ]; then
          docker compose --profile backend up -d --build
        else
          docker compose --profile backend up -d
        fi
      - echo "All backend services started!"
  
  backend:stop:
    desc: Stop all backend services (keep data)
    aliases: [be:stop]
    cmds:
      - docker compose --profile backend stop
      - echo "All backend services stopped (data preserved)"

  backend:down:
    desc: Stop and remove all backend services
    aliases: [be:down]
    cmds:
      - docker compose --profile backend down
      - echo "All backend services removed"

  backend:clean:
    desc: Stop and remove all backend containers and volumes
    aliases: [be:clean]
    cmds:
      - docker compose --profile backend down -v --remove-orphans
      - echo "Backend environment cleaned!"

  backend:status:
    desc: Show status of all backend services
    aliases: [be:status]
    cmds:
      - docker compose --profile infra --profile web --profile backend ps

  backend:logs:
    desc: Show and follow logs from all backend services
    aliases: [be:logs]
    cmds:
      - docker compose --profile backend logs --tail=50 -f
  
  backend:env:init:
    desc: Run env:init in each backend project (ensures .env exists)
    aliases: [be:env:init]
    cmds:
      - task: _run_all_backend_services
        vars:
          TARGET: env:init
      - echo "Backend environment initialization (env:init) complete."

  backend:migrate:
    desc: Run database migrations for development environment
    aliases: [be:migrate]
    cmds:
      - task: _run_all_backend_services 
        vars:
          TARGET: dev:migrate
      - echo "Database migrations completed!"

  backend:test:all:
    desc: Run tests for all Go services
    aliases: [be:test:all]
    cmds:
      - task: _run_all_backend_services 
        vars:
          TARGET: test

  backend:test:integration:
    desc: Run integration tests (requires dev infrastructure)
    aliases: [be:test:integration]
    cmds:
      - echo "Starting integration tests..."
      - task: infra:up
      - echo "Waiting for services to be ready..."
      - sleep 5
      - echo "Running integration tests..."
      - task: backend:test:all
      - task: infra:stop
  
  backend:rebuild:one:
    desc: "Rebuild a single backend service container. Options: profiles, events, orders. Default is profiles."
    aliases: [be:rebuild:one]
    vars:
      APP:
        sh: 'echo ${APP:-profiles}'
    cmds:
      - docker compose --profile backend build {{.APP}}
      - docker compose --profile backend up -d {{.APP}}
      - echo "✅ {{.APP}} backend service rebuilt and restarted!"

  # =============================================================================
  # FRONTEND SERVICES COMMANDS
  # =============================================================================
  
  frontend:up:
    desc: Start all frontend application containers (web-app profile). Use BUILD=true to rebuild images.
    aliases: [fe:up]
    vars:
      BUILD: '{{default "" .BUILD}}'
    cmds:
      - task: nginx:up
      - |
        if [ "{{.BUILD}}" = "true" ]; then
          docker compose --profile web-app up -d --build
        else
          docker compose --profile web-app up -d
        fi
      - echo "Frontend application containers started!"

  frontend:stop:
    desc: Stop all frontend application containers (web-app profile)
    aliases: [fe:stop]
    cmds:
      - docker compose --profile web-app stop
      - echo "Frontend application containers stopped!"

  frontend:down:
    desc: Stop and remove all frontend application containers (web-app profile)
    aliases: [fe:down]
    cmds:
      - docker compose --profile web-app down
      - echo "Frontend application containers removed!"

  frontend:clean:
    desc: Stop and remove all frontend containers and volumes (web-app profile)
    aliases: [fe:clean]
    cmds:
      - docker compose --profile web-app down -v --remove-orphans
      - echo "Frontend environment cleaned!"

  frontend:status:
    desc: Show status of all frontend application containers (web-app profile)
    aliases: [fe:status]
    cmds:
      - docker compose --profile web --profile web-app ps
  
  frontend:logs:
    desc: Show frontend logs
    aliases: [fe:logs]
    cmds:
      - docker compose --profile web-app logs --tail=50 -f 

  frontend:rebuild:one:
    desc: "Rebuild a single frontend app container. Options: vh-front, vh-dash, vh-payment, vh-payment-bo, vh-events-bo. Default is vh-front."
    aliases: [fe:rebuild:one]
    vars:
      APP:
        sh: 'echo ${APP:-vh-front}'
    cmds:
      - docker compose --profile web-app build {{.APP}}
      - docker compose --profile web-app up -d {{.APP}}
      - echo "✅ {{.APP}} frontend app rebuilt and restarted!"
  
  # =============================================================================
  # COMPLETE DEV ENVIRONMENT SETUPS
  # =============================================================================
  
  all:frontend:host:
    desc: Frontend dev mode (FE on host, nginx proxy, BE in containers, shared infra)
    aliases: [all:frontend, all:fe]
    cmds:
      - task: backend:up
      - |
        VH_FRONT_HOSTNAME=host.docker.internal \
        VH_DASH_HOSTNAME=host.docker.internal \
        VH_PAYMENT_HOSTNAME=host.docker.internal \
        VH_PAYMENT_BO_HOSTNAME=host.docker.internal \
        VH_EVENTS_BO_HOSTNAME=host.docker.internal \
        PROFILE_SERVICE_HOSTNAME=vh-srv-profiles \
        EVENTS_SERVICE_HOSTNAME=vh-srv-events \
        ORDERS_SERVICE_HOSTNAME=vh-srv-orders \
        docker compose --profile web up -d
      - echo ""
      - echo "✅ Frontend dev environment ready!"
      - echo "   Backend services running in containers"
      - echo "   Web apps → http://localhost:{{.NGINX_WEB_PORT}}"
      - echo "   APIs → http://localhost:{{.NGINX_API_PORT}}"
      - echo ""
      - echo "👉 Start frontend dev servers (hot-reload enabled):"
      - echo "   cd {{.DIR_FRONT}} && yarn start"
      - echo "   cd {{.DIR_DASH}} && yarn start"
      - echo "   cd {{.DIR_PAYMENT}} && yarn start"
      - echo "   cd {{.DIR_PAYMENT_BO}} && yarn start"
      - echo "   cd {{.DIR_EVENTS_BO}} && yarn start"

  all:backend:host:
    desc: Backend dev mode (BE on host, shared infra, nginx proxy, FE in containers)
    aliases: [all:backend, all:be]
    cmds:
      - task: infra:up
      - |
        VH_FRONT_HOSTNAME=vh-front \
        VH_FRONT_PORT=80 \
        VH_DASH_HOSTNAME=vh-dash \
        VH_DASH_PORT=80 \
        VH_PAYMENT_HOSTNAME=vh-payment \
        VH_PAYMENT_PORT=80 \
        VH_PAYMENT_BO_HOSTNAME=vh-payment-bo \
        VH_PAYMENT_BO_PORT=80 \
        VH_EVENTS_BO_HOSTNAME=vh-events-bo \
        VH_EVENTS_BO_PORT=80 \
        PROFILE_SERVICE_HOSTNAME=host.docker.internal \
        EVENTS_SERVICE_HOSTNAME=host.docker.internal \
        ORDERS_SERVICE_HOSTNAME=host.docker.internal \
        docker compose --profile web --profile web-app up -d --build
      - echo ""
      - echo "✅ Backend dev environment ready!"
      - echo "   Frontend apps running in containers"
      - echo "   Web apps → http://localhost:{{.NGINX_WEB_PORT}}"
      - echo "   APIs → http://localhost:{{.NGINX_API_PORT}}"
      - echo ""
      - echo "👉 Start backend services for development:"
      - echo "   cd {{.DIR_PROFILES}} && task run"
      - echo "   cd {{.DIR_EVENTS}} && task run"
      - echo "   cd {{.DIR_ORDERS}} && task run"

  all:stop:
    desc: Stop all running dev services (infra, backend, web, web-app)
    cmds:
      - docker compose --profile infra --profile backend --profile web --profile web-app stop
      - echo "All running dev services stopped"

  all:down:
    desc: Stop all dev services
    cmds:
      - docker compose --profile infra --profile backend --profile web --profile web-app down
      - echo "All dev services removed"

  all:clean:
    desc: Remove all dev containers and volumes (infra, backend, web, web-app)
    cmds:
      - docker compose --profile infra --profile backend --profile web --profile web-app down -v
      - echo "All containers and volumes removed"

  all:status:
    desc: Show status of all dev services (infra, backend, web, web-app)
    cmds:
      - docker compose --profile infra --profile backend --profile web --profile web-app ps
