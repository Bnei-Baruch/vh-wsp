# =================================================================
# UPSTREAM DEFINITIONS
# =================================================================

# Upstream blocks removed - using variables with resolver for lazy DNS resolution
# This prevents nginx from failing at startup when containers aren't running

# WebSocket upgrade for hot-reload
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# =================================================================
# SERVER BLOCK 1: WEB APPS (Port 8080)
# =================================================================

server {
    listen $NGINX_WEB_PORT;
    server_name localhost;
    
    # Resolver for Docker's internal DNS (allows lazy hostname resolution)
    # Uses Docker's embedded DNS (127.0.0.11) which is guaranteed across all platforms
    # Can be overridden via NGINX_RESOLVER environment variable in docker-compose
    resolver $NGINX_RESOLVER valid=10s;
    resolver_timeout 5s;
    
    # Disable caching for development
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires 0;
    
    # Root - vh-front
    location / {
        # Use variable with resolver for lazy DNS resolution
        set $frontend "$VH_FRONT_HOSTNAME:$VH_FRONT_PORT";
        proxy_pass http://$frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    # vh-dash
    location /dash {
        # Use variable with resolver for lazy DNS resolution
        set $dash "$VH_DASH_HOSTNAME:$VH_DASH_PORT";

        # Only rewrite in container mode (when hostname is NOT host.docker.internal)
        if ($dash !~ "^host\.docker\.internal:") {
            rewrite ^/dash/(.*)$ /$1 break;
        }

        proxy_pass http://$dash;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    # vh-payment
    location /pay {
        # Use variable with resolver for lazy DNS resolution
        set $payment "$VH_PAYMENT_HOSTNAME:$VH_PAYMENT_PORT";

        # Only rewrite in container mode (when hostname is NOT host.docker.internal)
        if ($payment !~ "^host\.docker\.internal:") {
            rewrite ^/pay/(.*)$ /$1 break;
        }
        
        proxy_pass http://$payment;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    # vh-payment-bo
    location /admin/payments {
        # Use variable with resolver for lazy DNS resolution
        set $payment_bo "$VH_PAYMENT_BO_HOSTNAME:$VH_PAYMENT_BO_PORT";

        # Only rewrite in container mode (when hostname is NOT host.docker.internal)
        if ($payment_bo !~ "^host\.docker\.internal:") {
            rewrite ^/admin/payments/(.*)$ /$1 break;
        }
        
        proxy_pass http://$payment_bo;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    # vh-events-bo
    location /admin/events {
        # Use variable with resolver for lazy DNS resolution
        set $events_bo "$VH_EVENTS_BO_HOSTNAME:$VH_EVENTS_BO_PORT";

        # Only rewrite in container mode (when hostname is NOT host.docker.internal)
        if ($events_bo !~ "^host\.docker\.internal:") {
            rewrite ^/admin/events/(.*)$ /$1 break;
        }
        
        proxy_pass http://$events_bo;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    # Health check
    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

# =================================================================
# SERVER BLOCK 2: BACKEND APIs (Port 9000)
# =================================================================

server {
    listen $NGINX_API_PORT;
    server_name localhost;
    
    # Resolver for Docker's internal DNS (allows lazy hostname resolution)
    # Uses Docker's embedded DNS (127.0.0.11) which is guaranteed across all platforms
    # Can be overridden via NGINX_RESOLVER environment variable in docker-compose
    resolver $NGINX_RESOLVER valid=10s;
    resolver_timeout 5s;
    
    # Profile service - strip /profile/ prefix
    # Frontend calls: /profile/v1/profiles
    # Backend receives: /v1/profiles
    location /profile/ {
        # Use variable with resolver for lazy DNS resolution
        # For host mode: PROFILE_SERVICE_HOSTNAME=host.docker.internal
        # For container mode: PROFILE_SERVICE_HOSTNAME=vh-srv-profiles
        set $profile_backend "$PROFILE_SERVICE_HOSTNAME:$PROFILES_APP_PORT";
        
        rewrite ^/profile/(.*)$ /$1 break;
        
        proxy_pass http://$profile_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Orders service - strip /pay/ prefix
    # Frontend calls: /pay/orders/paid, /pay/v2/order/123
    # Backend receives: /orders/paid, /v2/order/123
    # Note: Different from frontend /pay route (different ports: 8080 vs 9000)
    location /pay/ {
        # Use variable with resolver for lazy DNS resolution
        set $orders_backend "$ORDERS_SERVICE_HOSTNAME:$ORDERS_APP_PORT";
        
        rewrite ^/pay/(.*)$ /$1 break;
        
        proxy_pass http://$orders_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Events service - strip /events/ prefix
    # Frontend calls: /events/v1/events
    # Backend receives: /v1/events
    location /events/ {
        # Use variable with resolver for lazy DNS resolution
        set $events_backend "$EVENTS_SERVICE_HOSTNAME:$EVENTS_APP_PORT";
        
        rewrite ^/events/(.*)$ /$1 break;
        
        proxy_pass http://$events_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Default catch-all location
    location / {
        return 404;
    }
    
    # Health check
    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
